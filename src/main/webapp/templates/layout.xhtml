<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title><ui:insert name="title">BricoliRent</ui:insert></title>
    <h:outputStylesheet name="css/style.css"/>
</h:head>
<h:body styleClass="app-shell-body">
    <div class="app-shell-background" aria-hidden="true">
        <span class="app-glow glow-left"></span>
        <span class="app-glow glow-right"></span>
    </div>

    <div class="layout-wrapper">
        <header class="layout-header">
            <ui:insert name="header">
                <ui:include src="/templates/header.xhtml"/>
            </ui:insert>
        </header>

        <aside class="layout-sidebar">
            <ui:insert name="sidebar">
                <ui:include src="/templates/sidebar.xhtml"/>
            </ui:insert>
        </aside>

        <main class="layout-content">
            <div class="page-surface">
                <ui:insert name="content"/>
            </div>
        </main>

        <footer class="layout-footer">
            <ui:insert name="footer">
                <ui:include src="/templates/footer.xhtml"/>
            </ui:insert>
        </footer>
    </div>
</h:body>
</html>
