<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets">

    <div class="header-content">
        <div class="header-logo">
            <a href="#{request.contextPath}/app/dashboard.xhtml" style="text-decoration:none;">
                <span class="logo-text"> BricoliRent</span>
            </a>
        </div>
        <nav class="header-nav">
            <h:panelGroup rendered="#{loginBean.currentRole == 'CLIENT' or loginBean.currentRole == 'ADMIN'}">
                <a href="#{request.contextPath}/app/catalog/tools.xhtml">Catalogue</a>
            </h:panelGroup>
            <a href="#{request.contextPath}/app/dashboard.xhtml">Dashboard</a>
        </nav>
        <div class="header-user">
            <h:form>
                <h:outputText value="#{loginBean.currentUser.fullName}"
                              rendered="#{loginBean.loggedIn}"/>
                <h:commandLink value="Déconnexion" action="#{loginBean.logout()}"
                               rendered="#{loginBean.loggedIn}"/>
            </h:form>
        </div>
    </div>

</ui:composition>
