<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BricoliRent — Connexion</title>
    <h:outputStylesheet name="css/style.css"/>
</h:head>
<h:body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🔧 BricoliRent</h1>
                <p>Application de location d'outils</p>
            </div>

            <h:form id="loginForm">
                <h:messages id="messages" globalOnly="true" styleClass="alert alert-error"/>

                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <h:inputText id="username" value="#{loginBean.username}"
                                 required="true" requiredMessage="Le nom d'utilisateur est requis"
                                 styleClass="form-control"/>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <h:inputSecret id="password" value="#{loginBean.password}"
                                   required="true" requiredMessage="Le mot de passe est requis"
                                   styleClass="form-control"/>
                </div>

                <h:commandButton value="Se connecter" action="#{loginBean.login()}"
                                 styleClass="btn btn-primary btn-block"/>
            </h:form>
        </div>
    </div>
</h:body>
</html>
