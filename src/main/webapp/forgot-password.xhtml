<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BricoliRent — Mot de passe oublié</title>
    <h:outputStylesheet name="css/style.css"/>
</h:head>
<h:body>
    <div class="login-container">
        <div class="login-card">

            <div class="login-header">
                <h1 style="color: #1e293b; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <span style="background: none; font-size: 1.2em;"></span> BricoliRent
                </h1>
                <p>Réinitialisation du mot de passe</p>
            </div>

            <div style="margin-bottom: 20px;">
                <h:messages globalOnly="true" infoClass="alert alert-success" errorClass="alert alert-error" showDetail="true" showSummary="false"/>
            </div>

            <p style="color: #64748b; font-size: 0.95rem; margin-bottom: 24px; text-align: center;">
                Saisissez votre adresse email. Nous vous enverrons un lien permettant de créer un nouveau mot de passe.
            </p>

            <h:form id="forgotPasswordForm">
                <div class="form-group">
                    <h:outputLabel for="email" value="Adresse email"/>
                    <h:inputText id="email" 
                                 value="#{forgotPasswordBean.email}" 
                                 required="true" 
                                 requiredMessage="L'email est requis." 
                                 styleClass="form-control">
                        <f:validateRequired/>
                    </h:inputText>
                    <h:message for="email" style="color:#f87171;font-size:0.85rem;display:block;margin-top:4px;"/>
                </div>

                <div style="margin-top: 25px;">
                    <h:commandButton value="Envoyer le lien" 
                                     action="#{forgotPasswordBean.submitRequest}" 
                                     styleClass="btn btn-primary btn-block"/>
                </div>
            </h:form>

            <div style="text-align: center; margin-top: 24px;">
                <h:link outcome="/login.xhtml" style="color: #64748b; font-size: 0.9rem; text-decoration: none;">
                    ← Retour à la page de connexion
                </h:link>
            </div>

        </div>
    </div>
</h:body>
</html>
