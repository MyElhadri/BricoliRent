<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:c="jakarta.tags.core">

<f:metadata>
    <!-- Capture du paramètre token de l'URL -->
    <f:viewParam name="token" value="#{resetPasswordBean.token}"/>
    <f:viewAction action="#{resetPasswordBean.init}"/>
</f:metadata>

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BricoliRent — Nouveau mot de passe</title>
    <h:outputStylesheet name="css/style.css"/>
</h:head>

<h:body>
    <div class="login-container">
        <div class="login-card">

            <div class="login-header">
                <h1 style="color: #1e293b; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <span style="background: none; font-size: 1.2em;"></span> BricoliRent
                </h1>
                <p>Créer un nouveau mot de passe</p>
            </div>

            <div style="margin-bottom: 20px;">
                <h:messages globalOnly="true" infoClass="alert alert-success" errorClass="alert alert-error" showDetail="true" showSummary="false"/>
            </div>

            <c:choose>
                <c:when test="#{not resetPasswordBean.validToken}">
                    <div class="alert alert-error">
                        Ce lien de réinitialisation est manquant, invalide ou expiré.
                    </div>
                    <div style="text-align: center; margin-top: 24px;">
                        <h:link outcome="/forgot-password.xhtml" style="color: #2563eb; font-weight: 500; text-decoration: none;">
                            Refaire une demande de réinitialisation
                        </h:link>
                    </div>
                </c:when>

                <c:otherwise>
                    <h:form id="resetPasswordForm">
                        <div class="form-group">
                            <h:outputLabel for="password" value="Nouveau mot de passe"/>
                            <h:inputSecret id="password" 
                                           value="#{resetPasswordBean.password}" 
                                           required="true" 
                                           requiredMessage="Le mot de passe est obligatoire." 
                                           styleClass="form-control">
                                <f:validateRequired/>
                            </h:inputSecret>
                            <h:message for="password" style="color:#f87171;font-size:0.85rem;display:block;margin-top:4px;"/>
                        </div>

                        <div class="form-group">
                            <h:outputLabel for="confirm" value="Confirmer le nouveau mot de passe"/>
                            <h:inputSecret id="confirm" 
                                           value="#{resetPasswordBean.confirmPassword}" 
                                           required="true" 
                                           requiredMessage="La confirmation est obligatoire." 
                                           styleClass="form-control">
                                <f:validateRequired/>
                            </h:inputSecret>
                            <h:message for="confirm" style="color:#f87171;font-size:0.85rem;display:block;margin-top:4px;"/>
                        </div>

                        <div style="margin-top: 25px;">
                            <h:commandButton value="Valider" 
                                             action="#{resetPasswordBean.updatePassword}" 
                                             styleClass="btn btn-primary btn-block"/>
                        </div>
                    </h:form>
                </c:otherwise>
            </c:choose>

        </div>
    </div>
</h:body>
</html>
