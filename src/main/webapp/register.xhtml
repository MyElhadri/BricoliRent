<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BricoliRent — Inscription Client</title>
    <h:outputStylesheet name="css/style.css"/>
</h:head>

<h:body>
    <div class="login-container">
        <div class="login-card">

            <!-- Logo / Titre -->
            <div class="login-header">
                <h1> BricoliRent</h1>
                <p>Créer un compte client</p>
            </div>

            <!-- Messages globaux -->
            <div style="margin-bottom: 20px;">
                <h:messages globalOnly="true" infoClass="alert alert-success" errorClass="alert alert-error" showDetail="true" showSummary="false"/>
            </div>

            <!-- Formulaire d'inscription -->
            <h:form id="registerForm">

                <div class="form-group">
                    <h:outputLabel for="fullName" value="Nom complet"/>
                    <h:inputText id="fullName"
                                 value="#{registerBean.fullName}"
                                 required="true"
                                 requiredMessage="Le nom complet est obligatoire."
                                 styleClass="form-control">
                        <f:validateRequired/>
                    </h:inputText>
                    <h:message for="fullName" style="color:#f87171;font-size:0.85rem;display:block;margin-top:5px;"/>
                </div>

                <div class="form-group">
                    <h:outputLabel for="email" value="Adresse email"/>
                    <h:inputText id="email"
                                 value="#{registerBean.email}"
                                 required="true"
                                 requiredMessage="L'email est obligatoire."
                                 validatorMessage="Format d'email invalide."
                                 autocomplete="email"
                                 styleClass="form-control">
                        <f:validateRequired/>
                    </h:inputText>
                    <h:message for="email" style="color:#f87171;font-size:0.85rem;display:block;margin-top:5px;"/>
                </div>

                <div class="form-group">
                    <h:outputLabel for="password" value="Mot de passe"/>
                    <h:inputSecret id="password"
                                   value="#{registerBean.password}"
                                   required="true"
                                   requiredMessage="Le mot de passe est obligatoire."
                                   redisplay="false"
                                   styleClass="form-control">
                        <f:validateRequired/>
                    </h:inputSecret>
                    <h:message for="password" style="color:#f87171;font-size:0.85rem;display:block;margin-top:5px;"/>
                </div>

                <div class="form-group">
                    <h:outputLabel for="confirmPassword" value="Confirmer le mot de passe"/>
                    <h:inputSecret id="confirmPassword"
                                   value="#{registerBean.confirmPassword}"
                                   required="true"
                                   requiredMessage="La confirmation est obligatoire."
                                   redisplay="false"
                                   styleClass="form-control">
                        <f:validateRequired/>
                    </h:inputSecret>
                    <h:message for="confirmPassword" style="color:#f87171;font-size:0.85rem;display:block;margin-top:5px;"/>
                </div>

                <div style="margin-top: 25px;">
                    <h:commandButton value="S'inscrire"
                                     action="#{registerBean.register}"
                                     styleClass="btn btn-primary btn-block"/>
                </div>

            </h:form>

            <div style="text-align: center; margin-top: 20px;">
                <h:link outcome="/login.xhtml" style="color: #64748b; font-size: 0.9rem;">
                    Vous avez déjà un compte ? Connectez-vous
                </h:link>
            </div>

        </div>
    </div>
</h:body>
</html>
