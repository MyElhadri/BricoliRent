<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/templates/layout.xhtml">

    <ui:define name="title">Administration - Catégories</ui:define>

    <ui:define name="content">
        <div style="padding: 2rem;">
            <h2>Gestion des Catégories (Administration)</h2>
            <h:messages globalOnly="true" showDetail="true" showSummary="true" style="color: #e94560; font-weight: bold; list-style: none; padding: 0;" />

            <div style="display: flex; gap: 2rem; margin-top: 1.5rem;">
                
                <!-- Formulaire -->
                <div style="flex: 1; padding: 1.5rem; background: rgba(255,255,255,0.05); border-radius: 8px;">
                    <h3>#{categoryAdminBean.currentCategory.id == null ? 'Nouvelle Catégorie' : 'Modifier la Catégorie'}</h3>
                    <h:form id="categoryForm">
                        <h:panelGrid columns="1" style="width: 100%;">
                            <h:outputLabel value="Nom de la catégorie :" />
                            <h:inputText value="#{categoryAdminBean.currentCategory.name}" 
                                         required="true" requiredMessage="Le nom est requis"
                                         style="width: 100%; padding: 0.5rem; margin-bottom: 1rem;" />
                            
                            <h:outputLabel value="Description :" />
                            <h:inputTextarea value="#{categoryAdminBean.currentCategory.description}" 
                                             rows="4" style="width: 100%; padding: 0.5rem; margin-bottom: 1rem;" />
                        </h:panelGrid>
                        
                        <div>
                            <h:commandButton value="Enregistrer" action="#{categoryAdminBean.save}" 
                                             style="padding: 0.6rem 1.4rem; background: #e94560; color: white; border: none; border-radius: 4px; margin-right: 1rem; cursor: pointer;" />
                            <h:commandButton value="Annuler" action="#{categoryAdminBean.prepareNew}" immediate="true"
                                             rendered="#{categoryAdminBean.currentCategory.id != null}"
                                             style="padding: 0.6rem 1.4rem; background: #555; color: white; border: none; border-radius: 4px; cursor: pointer;" />
                        </div>
                    </h:form>
                </div>

                <!-- Tableau -->
                <div style="flex: 2;">
                    <h:form id="listForm">
                        <h:dataTable value="#{categoryAdminBean.categories}" var="cat" 
                                     style="width: 100%; border-collapse: collapse; text-align: left;">
                            <h:column>
                                <f:facet name="header"><div style="padding: 0.5rem; border-bottom: 2px solid #e94560;">ID</div></f:facet>
                                <div style="padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);">#{cat.id}</div>
                            </h:column>
                            <h:column>
                                <f:facet name="header"><div style="padding: 0.5rem; border-bottom: 2px solid #e94560;">Nom</div></f:facet>
                                <div style="padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);">#{cat.name}</div>
                            </h:column>
                            <h:column>
                                <f:facet name="header"><div style="padding: 0.5rem; border-bottom: 2px solid #e94560;">Description</div></f:facet>
                                <div style="padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);">#{cat.description}</div>
                            </h:column>
                            <h:column>
                                <f:facet name="header"><div style="padding: 0.5rem; border-bottom: 2px solid #e94560;">Actions</div></f:facet>
                                <div style="padding: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                    <h:commandLink value="📝 Modifier" action="#{categoryAdminBean.edit(cat)}" style="color: #00adb5; text-decoration: none; margin-right: 15px;" />
                                    <h:commandLink value="❌ Supprimer" action="#{categoryAdminBean.delete(cat)}" 
                                                   onclick="return confirm('Attention : suppression impossible si des outils y sont rattachés. Continuer ?');" 
                                                   style="color: #ff4c4c; text-decoration: none;" />
                                </div>
                            </h:column>
                        </h:dataTable>
                    </h:form>
                </div>
            </div>
        </div>
    </ui:define>
</ui:composition>
</html>
