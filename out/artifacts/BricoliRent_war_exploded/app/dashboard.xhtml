<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core">

<ui:composition template="/templates/layout.xhtml">

    <ui:define name="title">Dashboard — BricoliRent</ui:define>

    <ui:define name="content">
        <div class="dashboard-container">
            <h2>Tableau de bord</h2>
            <p>Bienvenue, <h:outputText value="#{loginBean.loggedUser.firstName}" rendered="#{loginBean.loggedIn}"/> !</p>

            <div class="dashboard-cards">
                <div class="card">
                    <h3>Catalogue</h3>
                    <p>Parcourir les outils disponibles</p>
                    <h:link outcome="/app/catalog/tools.xhtml" styleClass="btn btn-primary">Voir le catalogue</h:link>
                </div>

                <div class="card">
                    <h3>Mes réservations</h3>
                    <p>Consulter vos réservations en cours</p>
                    <h:link outcome="/app/client/reservations.xhtml" styleClass="btn btn-primary">Mes réservations</h:link>
                </div>

                <div class="card">
                    <h3>Paiements</h3>
                    <p>Historique de vos paiements</p>
                    <h:link outcome="/app/client/payments.xhtml" styleClass="btn btn-primary">Voir les paiements</h:link>
                </div>
            </div>
        </div>
    </ui:define>

</ui:composition>
</html>
